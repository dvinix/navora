<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navora — Live Guidance Test Client</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080d1a;
      --surface:   #0f1729;
      --card:      #141e35;
      --border:    rgba(59,130,246,.18);
      --blue:      #3b82f6;
      --blue-glow: rgba(59,130,246,.35);
      --green:     #22c55e;
      --amber:     #f59e0b;
      --red:       #ef4444;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    14px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      height: 100vh;
      gap: 0;
    }

    /* ── Left: Camera Panel ── */
    .camera-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      background: #050810;
      border-right: 1px solid var(--border);
    }

    .camera-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -.3px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--blue), #6366f1);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    #status-badge {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px; font-weight: 600;
      letter-spacing: .3px;
      text-transform: uppercase;
      border: 1px solid var(--border);
      background: var(--card);
      transition: all .3s;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .3s;
    }
    #status-badge.connected .status-dot  { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse-dot 2s infinite; }
    #status-badge.connected              { border-color: rgba(34,197,94,.3); }
    #status-badge.error .status-dot      { background: var(--red); }
    #status-badge.error                  { border-color: rgba(239,68,68,.3); }

    @keyframes pulse-dot { 0%,100% { opacity:1 } 50% { opacity:.4 } }

    .video-wrapper {
      flex: 1;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    #video {
      width: 100%; height: 100%;
      object-fit: contain;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    #canvas { display: none; }

    /* Action overlay on video */
    #action-overlay {
      position: absolute;
      top: 32px; left: 50%; transform: translateX(-50%);
      padding: 10px 28px;
      border-radius: 999px;
      font-size: 15px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.1);
      transition: all .35s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
      opacity: 0;
    }
    #action-overlay.show { opacity: 1; }
    #action-overlay.forward { background: rgba(34,197,94,.25); color: #4ade80; border-color: rgba(34,197,94,.4); }
    #action-overlay.stop    { background: rgba(239,68,68,.3);  color: #f87171; border-color: rgba(239,68,68,.5); }
    #action-overlay.left    { background: rgba(59,130,246,.25); color: #60a5fa; border-color: rgba(59,130,246,.4); }
    #action-overlay.right   { background: rgba(245,158,11,.25); color: #fbbf24; border-color: rgba(245,158,11,.4); }

    .camera-footer {
      padding: 14px 24px;
      display: flex; align-items: center; gap: 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .btn {
      padding: 10px 22px;
      border-radius: 10px;
      border: none;
      font-family: inherit;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 0 20px var(--blue-glow);
    }
    .btn-primary:hover:not(:disabled) { background: #2563eb; transform: translateY(-1px); }
    .btn-danger  { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
    .btn-danger:hover:not(:disabled)  { background: rgba(239,68,68,.25); }

    .fps-badge {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted);
      background: var(--card);
      padding: 5px 10px; border-radius: 6px;
    }

    /* ── Right: Sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 0;
      background: var(--surface);
      overflow-y: auto;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .sidebar-section {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* Guidance card */
    .guidance-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      transition: border-color .3s;
    }
    .guidance-card.forward { border-color: rgba(34,197,94,.4); }
    .guidance-card.stop    { border-color: rgba(239,68,68,.5); }
    .guidance-card.left    { border-color: rgba(59,130,246,.4); }
    .guidance-card.right   { border-color: rgba(245,158,11,.4); }

    #action-icon { font-size: 28px; margin-bottom: 6px; display: block; }

    #guidance-text {
      font-size: 15px; font-weight: 500; line-height: 1.5;
      color: var(--text);
      min-height: 44px;
    }

    .speak-badge {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 10px;
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 6px;
      background: rgba(34,197,94,.12);
      color: var(--green);
      border: 1px solid rgba(34,197,94,.25);
    }
    .speak-badge.silent { background: rgba(100,116,139,.1); color: var(--muted); border-color: rgba(100,116,139,.2); }

    /* Obstacle card */
    .obstacle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .obstacle-label { font-weight: 600; }
    .obstacle-meta  { display: flex; gap: 10px; align-items: center; }
    .conf-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 2px 8px; border-radius: 5px;
      background: rgba(59,130,246,.12);
      color: var(--blue);
    }
    .depth-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 2px 8px; border-radius: 5px;
      background: rgba(245,158,11,.12);
      color: var(--amber);
    }

    /* Latency */
    .latency-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .latency-cell {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: center;
    }
    .latency-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px; font-weight: 600;
      color: var(--blue);
    }
    .latency-key {
      font-size: 10px; color: var(--muted); margin-top: 3px;
      text-transform: uppercase; letter-spacing: .5px;
    }

    /* Session */
    .session-id-box {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      word-break: break-all;
    }

    /* TTS toggle */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .toggle-label { font-size: 13px; font-weight: 500; }
    .toggle {
      position: relative; width: 44px; height: 24px;
      display: inline-block;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      transition: .3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      left: 3px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px;
      background: var(--muted);
      border-radius: 50%;
      transition: .3s;
    }
    .toggle input:checked + .slider { background: rgba(59,130,246,.2); border-color: var(--blue); }
    .toggle input:checked + .slider::before { transform: translate(20px,-50%); background: var(--blue); }

    /* Frame rate slider */
    .range-row { display: flex; align-items: center; gap: 12px; }
    .range-row input[type=range] {
      flex: 1;
      accent-color: var(--blue);
      height: 4px;
    }
    .range-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--blue);
      min-width: 40px; text-align: right;
    }

    /* History log */
    #history-log {
      max-height: 130px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #history-log::-webkit-scrollbar { width: 3px; }
    #history-log::-webkit-scrollbar-thumb { background: var(--border); border-radius:4px; }
    .log-item {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      padding: 4px 8px;
      background: var(--card);
      border-radius: 5px;
      border-left: 2px solid var(--border);
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform:none; } }
    .log-item.stop    { border-left-color: var(--red);   color: #fca5a5; }
    .log-item.forward { border-left-color: var(--green); color: #86efac; }
    .log-item.left, .log-item.right { border-left-color: var(--blue); color: #93c5fd; }

    /* Empty state */
    .empty { color: var(--muted); font-size: 12px; font-style: italic; text-align: center; padding: 12px; }

    /* Subtle glow on stop action */
    @keyframes danger-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
      50%      { box-shadow: 0 0 30px 6px rgba(239,68,68,.2); }
    }
    .camera-panel.danger { animation: danger-pulse 1.2s infinite; }

    /* WS URL input */
    .url-row {
      display: flex; gap: 8px;
    }
    .url-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    .url-input:focus { border-color: var(--blue); }
  </style>
</head>
<body>
<div class="layout">

  <!-- ═══ LEFT: Camera ═══ -->
  <div class="camera-panel" id="camera-panel">
    <div class="camera-header">
      <div class="logo">
        <div class="logo-icon">🧭</div>
        Navora Test Client
      </div>
      <div id="status-badge">
        <span class="status-dot"></span>
        <span id="status-text">Disconnected</span>
      </div>
    </div>

    <div class="video-wrapper">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas"></canvas>
      <div id="action-overlay">⬆ FORWARD</div>
    </div>

    <div class="camera-footer">
      <button class="btn btn-primary" id="btn-start" onclick="startSession()">▶ Start Camera</button>
      <button class="btn btn-danger" id="btn-stop" onclick="stopSession()" disabled>■ Stop</button>
      <div class="fps-badge" id="fps-badge">— fps</div>
    </div>
  </div>

  <!-- ═══ RIGHT: Sidebar ═══ -->
  <div class="sidebar">

    <!-- Connection -->
    <div class="sidebar-section">
      <div class="section-label">WebSocket URL</div>
      <div class="url-row">
        <input class="url-input" id="ws-url" value="ws://localhost:8000/ws/live-guidance" />
      </div>
    </div>

    <!-- Guidance -->
    <div class="sidebar-section">
      <div class="section-label">Live Guidance</div>
      <div class="guidance-card" id="guidance-card">
        <span id="action-icon">⏳</span>
        <div id="guidance-text">Waiting for camera stream…</div>
        <div class="speak-badge silent" id="speak-badge">🔇 Silent</div>
      </div>
    </div>

    <!-- Obstacles -->
    <div class="sidebar-section">
      <div class="section-label">Detected Obstacles</div>
      <div id="obstacle-list"><div class="empty">No detections yet</div></div>
    </div>

    <!-- Latency -->
    <div class="sidebar-section">
      <div class="section-label">Pipeline Latency</div>
      <div class="latency-grid">
        <div class="latency-cell">
          <div class="latency-val" id="lat-caption">—</div>
          <div class="latency-key">BLIP-2</div>
        </div>
        <div class="latency-cell">
          <div class="latency-val" id="lat-detect">—</div>
          <div class="latency-key">YOLO</div>
        </div>
        <div class="latency-cell">
          <div class="latency-val" id="lat-depth">—</div>
          <div class="latency-key">MiDaS</div>
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div class="sidebar-section">
      <div class="section-label">Settings</div>

      <div class="toggle-row" style="margin-bottom:14px">
        <span class="toggle-label">🔊 Voice TTS</span>
        <label class="toggle">
          <input type="checkbox" id="tts-toggle" checked />
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row" style="margin-bottom:8px">
        <span class="toggle-label" style="font-size:12px;color:var(--muted)">Frame Rate</span>
        <div class="range-val" id="fps-val">2 fps</div>
      </div>
      <div class="range-row">
        <input type="range" id="fps-slider" min="1" max="10" value="2"
               oninput="setFPS(this.value)" />
      </div>

      <div style="margin-top:14px">
        <div class="toggle-row" style="margin-bottom:8px">
          <span class="toggle-label" style="font-size:12px;color:var(--muted)">JPEG Quality</span>
          <div class="range-val" id="quality-val">60%</div>
        </div>
        <div class="range-row">
          <input type="range" id="quality-slider" min="20" max="95" value="60"
                 oninput="document.getElementById('quality-val').textContent = this.value + '%'" />
        </div>
      </div>
    </div>

    <!-- Session -->
    <div class="sidebar-section">
      <div class="section-label">Session</div>
      <div class="session-id-box" id="session-box">—</div>
    </div>

    <!-- Log -->
    <div class="sidebar-section">
      <div class="section-label">Guidance History</div>
      <div id="history-log"><div class="empty">No events yet</div></div>
    </div>

  </div>
</div>

<script>
  /* ─── State ─── */
  let ws = null;
  let stream = null;
  let sessionId = null;
  let frameTimer = null;
  let framesPerSecond = 2;
  let frameCount = 0;
  let fpsInterval = null;
  const synth = window.speechSynthesis;

  const video    = document.getElementById('video');
  const canvas   = document.getElementById('canvas');
  const ctx      = canvas.getContext('2d');

  /* ─── FPS control ─── */
  function setFPS(v) {
    framesPerSecond = parseInt(v);
    document.getElementById('fps-val').textContent = v + ' fps';
    if (frameTimer) {
      clearInterval(frameTimer);
      frameTimer = setInterval(sendFrame, 1000 / framesPerSecond);
    }
  }

  /* ─── Start / Stop ─── */
  async function startSession() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
      video.srcObject = stream;
      await video.play();
    } catch (e) {
      setStatus('error', 'Camera denied: ' + e.message);
      return;
    }

    const wsUrl = document.getElementById('ws-url').value.trim();
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      setStatus('connected', 'Connected');
      document.getElementById('btn-start').disabled = true;
      document.getElementById('btn-stop').disabled = false;
      frameTimer = setInterval(sendFrame, 1000 / framesPerSecond);

      // FPS counter
      fpsInterval = setInterval(() => {
        document.getElementById('fps-badge').textContent = frameCount + ' fps sent';
        frameCount = 0;
      }, 1000);
    };

    ws.onmessage = (evt) => {
      try {
        const data = JSON.parse(evt.data);
        if (data.error) { logEntry('error', data.error); return; }
        // Save server-generated session_id for next frames
        if (data.session_id) {
          sessionId = data.session_id;
          document.getElementById('session-box').textContent = sessionId;
        }
        updateUI(data);
      } catch (_) {}
    };

    ws.onerror = () => setStatus('error', 'WebSocket error');
    ws.onclose = () => {
      setStatus('', 'Disconnected');
      cleanup();
    };
  }

  function stopSession() {
    if (ws) ws.close();
    cleanup();
  }

  function cleanup() {
    clearInterval(frameTimer); frameTimer = null;
    clearInterval(fpsInterval); fpsInterval = null;
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').disabled = true;
    document.getElementById('fps-badge').textContent = '— fps';
    document.getElementById('camera-panel').classList.remove('danger');
  }

  /* ─── Frame capture & send ─── */
  function sendFrame() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) return;

    canvas.width = vw; canvas.height = vh;
    ctx.drawImage(video, 0, 0, vw, vh);

    const quality = parseInt(document.getElementById('quality-slider').value) / 100;
    const frame_base64 = canvas.toDataURL('image/jpeg', quality);

    ws.send(JSON.stringify({
      session_id: sessionId || undefined,
      frame_base64
    }));
    frameCount++;
  }

  /* ─── UI updates ─── */
  const ACTION_ICONS  = { forward:'⬆️', stop:'🛑', left:'⬅️', right:'➡️' };
  const ACTION_LABELS = { forward:'MOVE FORWARD', stop:'STOP!', left:'MOVE LEFT', right:'MOVE RIGHT' };

  function updateUI(data) {
    const action = (data.action || 'forward').toLowerCase();

    // Guidance card
    const card = document.getElementById('guidance-card');
    card.className = 'guidance-card ' + action;
    document.getElementById('action-icon').textContent = ACTION_ICONS[action] || '⬆️';
    document.getElementById('guidance-text').textContent = data.guidance_text || '—';

    // speak_now badge
    const speakBadge = document.getElementById('speak-badge');
    if (data.speak_now) {
      speakBadge.className = 'speak-badge';
      speakBadge.textContent = '🔊 Speaking';
    } else {
      speakBadge.className = 'speak-badge silent';
      speakBadge.textContent = '🔇 Silent';
    }

    // Video overlay
    const overlay = document.getElementById('action-overlay');
    overlay.className = 'action-overlay show ' + action;
    overlay.textContent = (ACTION_ICONS[action] || '') + ' ' + ACTION_LABELS[action];
    // use correct id
    overlay.id = 'action-overlay';

    // Camera panel danger glow
    const panel = document.getElementById('camera-panel');
    panel.classList.toggle('danger', action === 'stop');

    // TTS
    if (data.speak_now && document.getElementById('tts-toggle').checked && data.guidance_text) {
      speak(data.guidance_text);
    }

    // Obstacles
    renderObstacles(data.priority_obstacle, data.detections || []);

    // Latency
    if (data.latency) {
      document.getElementById('lat-caption').textContent = fmt(data.latency.caption_seconds);
      document.getElementById('lat-detect').textContent  = fmt(data.latency.detection_seconds);
      document.getElementById('lat-depth').textContent   = fmt(data.latency.depth_seconds);
    }

    // History log
    logEntry(action, data.guidance_text);
  }

  function fmt(s) {
    if (s === undefined || s === null) return '—';
    return s < 1 ? Math.round(s * 1000) + 'ms' : s.toFixed(2) + 's';
  }

  function renderObstacles(priority, detections) {
    const list = document.getElementById('obstacle-list');
    if (!detections || detections.length === 0) {
      list.innerHTML = '<div class="empty">No obstacles detected</div>';
      return;
    }
    // Show top 5
    const shown = detections.slice(0, 5);
    list.innerHTML = shown.map(d => {
      const isPriority = priority && d.label === priority.label;
      const depthStr = d.depth_score !== null && d.depth_score !== undefined
        ? `<span class="depth-pill">depth ${d.depth_score}</span>` : '';
      return `
        <div class="obstacle-row" style="${isPriority ? 'border-color:rgba(245,158,11,.5)' : ''}">
          <span class="obstacle-label">${isPriority ? '⚡ ' : ''}${d.label}</span>
          <span class="obstacle-meta">
            <span class="conf-pill">${(d.confidence * 100).toFixed(0)}%</span>
            ${depthStr}
          </span>
        </div>`;
    }).join('');
  }

  const MAX_LOG = 30;
  const logItems = [];
  function logEntry(action, text) {
    if (!text) return;
    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    logItems.unshift({ action, text, time: now });
    if (logItems.length > MAX_LOG) logItems.pop();

    const log = document.getElementById('history-log');
    log.innerHTML = logItems.map(item =>
      `<div class="log-item ${item.action || ''}">[${item.time}] ${item.text}</div>`
    ).join('');
  }

  /* ─── TTS ─── */
  function speak(text) {
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = 1.05; utt.pitch = 1.0; utt.volume = 1.0;
    // prefer a clear English voice if available
    const voices = synth.getVoices();
    const preferred = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('google'))
                   || voices.find(v => v.lang.startsWith('en'));
    if (preferred) utt.voice = preferred;
    synth.speak(utt);
  }

  /* ─── Status badge ─── */
  function setStatus(cls, label) {
    const badge = document.getElementById('status-badge');
    badge.className = cls ? `${cls}` : '';
    document.getElementById('status-text').textContent = label;
  }
</script>
</body>
</html>
